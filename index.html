<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Dashboard</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── THEME VARIABLES ── */
[data-theme="light"] {
  --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0f0ec;
  --text: #1a1a1a; --text2: #6b6b6b; --text3: #aaa;
  --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.16);
  --toggle-bg: #e8e8e4; --toggle-knob: #ffffff;
}
[data-theme="dark"] {
  --bg: #1c1c1c; --bg2: #242424; --bg3: #2c2c2c;
  --text: #efefef; --text2: #999; --text3: #555;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.16);
  --toggle-bg: #444; --toggle-knob: #1c1c1c;
}
:root {
  --green: #1D9E75; --coral: #D85A30; --amber: #BA7517;
  --red: #E24B4A; --purple: #534AB7;
  --radius: 12px; --radius-sm: 8px; --sidebar-w: 272px;
}

body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; transition: background 0.2s, color 0.2s; }

/* ── LAYOUT ── */
.layout { display: flex; min-height: 100vh; }
.sidebar { width: var(--sidebar-w); flex-shrink: 0; background: var(--bg2); border-right: 0.5px solid var(--border2); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.main { flex: 1; min-width: 0; padding: 1.5rem 1.5rem 3rem; }
.main-inner { max-width: 660px; margin: 0 auto; }

/* ── SIDEBAR ── */
.sidebar-top { padding: 1.25rem 1rem 0.75rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.sidebar-logo { font-size: 16px; font-weight: 600; color: var(--text); }
.sidebar-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
.theme-toggle { width: 36px; height: 20px; border-radius: 10px; background: var(--toggle-bg); border: none; cursor: pointer; position: relative; flex-shrink: 0; transition: background 0.2s; }
.theme-toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; border-radius: 50%; background: var(--toggle-knob); transition: transform 0.2s; }
[data-theme="dark"] .theme-toggle::after { transform: translateX(16px); }
.theme-icon { font-size: 12px; position: absolute; top: 50%; transform: translateY(-50%); }
.theme-icon-sun { left: 4px; }
.theme-icon-moon { right: 3px; }
.sidebar-nav { padding: 0.5rem 0; border-bottom: 0.5px solid var(--border); }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 1rem; font-size: 13px; color: var(--text2); cursor: pointer; border: none; background: none; width: 100%; text-align: left; transition: background 0.1s, color 0.1s; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--bg3); color: var(--text); font-weight: 500; }
.nav-icon { font-size: 14px; width: 20px; text-align: center; flex-shrink: 0; }
.sidebar-section { flex: 1; overflow-y: auto; }
.sidebar-panel { display: none; padding: 1rem; }
.sidebar-panel.active { display: block; }
.sidebar-panel-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 1rem; padding-bottom: 8px; border-bottom: 0.5px solid var(--border); }

/* ── MONTHLY CALENDAR ── */
.month-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.month-nav { background: none; border: 0.5px solid var(--border2); border-radius: 6px; color: var(--text2); cursor: pointer; font-size: 13px; padding: 3px 8px; }
.month-nav:hover { color: var(--text); background: var(--bg3); }
.month-name { font-size: 13px; font-weight: 500; color: var(--text); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 12px; }
.cal-dow { font-size: 10px; color: var(--text3); text-align: center; padding: 2px 0; font-weight: 500; }
.cal-day { aspect-ratio: 1; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text2); position: relative; border: 0.5px solid transparent; }
.cal-day.today { border-color: var(--green); color: var(--text); font-weight: 600; }
.cal-day .dot { position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; }
.cal-day.pct-low .dot { background: var(--red); }
.cal-day.pct-mid .dot { background: var(--amber); }
.cal-day.pct-high .dot { background: var(--green); }
.cal-day.pct-full { background: rgba(29,158,117,0.12); }
.cal-day.pct-full .dot { background: var(--green); }
.month-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
.mstat { background: var(--bg3); border-radius: var(--radius-sm); padding: 8px 10px; }
.mstat-label { font-size: 10px; color: var(--text2); margin-bottom: 2px; }
.mstat-val { font-size: 17px; font-weight: 600; color: var(--text); }
.month-prog-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 5px; }
.month-prog-track { height: 6px; background: var(--border2); border-radius: 3px; overflow: hidden; }
.month-prog-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width 0.4s ease; }
.streak-row { display: flex; align-items: center; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }
.streak-label { font-size: 11px; color: var(--text2); }
.streak-val { font-size: 15px; font-weight: 600; color: var(--amber); margin-left: auto; }

/* ── HEADER ── */
.header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 10px; }
.header-left .day-name { font-size: 24px; font-weight: 600; color: var(--text); }
.header-left .date-str { font-size: 13px; color: var(--text2); margin-top: 2px; }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 7px; }
.day-pills { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
.day-pill { font-size: 12px; padding: 5px 9px; border: 0.5px solid var(--border2); border-radius: 20px; background: var(--bg2); color: var(--text2); cursor: pointer; transition: all 0.15s; }
.day-pill:hover { background: var(--bg3); color: var(--text); }
.day-pill.active { background: var(--text); color: var(--bg); border-color: var(--text); }
.reset-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; }
.reset-btn:hover { color: var(--text2); }

/* ── SYNC STATUS ── */
.sync-status { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }
.sync-dot.synced { background: var(--green); }
.sync-dot.syncing { background: var(--amber); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* ── PROGRESS ── */
.prog-card { background: var(--bg2); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: 1rem; border: 0.5px solid var(--border); }
.prog-header { display: flex; justify-content: space-between; font-size: 12px; color: var(--text2); margin-bottom: 6px; }
.prog-track { height: 8px; background: var(--border2); border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
.prog-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
.fill-green { background: var(--green); }
.fill-coral { background: var(--coral); }
.stat-row { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; }
.stat { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; border: 0.5px solid var(--border); }
.stat-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.stat-val { font-size: 19px; font-weight: 600; color: var(--text); }

/* ── BLOCKS ── */
.block { background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 0.75rem; overflow: hidden; }
.block-hdr { display: flex; align-items: center; gap: 10px; padding: 11px 16px; cursor: pointer; user-select: none; border-bottom: 0.5px solid transparent; transition: border-color 0.15s; }
.block-hdr.open { border-bottom-color: var(--border); }
.block-icon { font-size: 15px; width: 26px; text-align: center; flex-shrink: 0; }
.block-title { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; }
.block-time { font-size: 11px; font-weight: 700; color: var(--text2); flex-shrink: 0; margin-right: 4px; }
.block-badge { font-size: 11px; color: var(--text2); background: var(--bg2); padding: 3px 9px; border-radius: 20px; flex-shrink: 0; }
.block-chev { font-size: 13px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; }
.block-chev.open { transform: rotate(90deg); }
.block-body { display: none; padding: 8px 16px 12px; }
.block-body.open { display: block; }

/* ── TASKS ── */
.task-list { list-style: none; }
.task-item { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 0.5px solid var(--border); }
.task-item:last-child { border-bottom: none; }
.task-cb { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border2); cursor: pointer; flex-shrink: 0; appearance: none; -webkit-appearance: none; background: var(--bg); position: relative; transition: background 0.15s, border-color 0.15s; }
.task-cb:checked { background: var(--green); border-color: var(--green); }
.task-cb:checked::after { content: ''; position: absolute; left: 4px; top: 1px; width: 6px; height: 10px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg); }
.task-label { font-size: 13px; color: var(--text); line-height: 1.5; cursor: pointer; flex: 1; }
.task-label.done { color: var(--text3); text-decoration: line-through; }
.task-time { font-size: 11px; font-weight: 700; color: var(--text3); flex-shrink: 0; min-width: 36px; text-align: right; }

/* ── TAGS ── */
.tag { display: inline-block; font-size: 10px; font-weight: 500; border-radius: 4px; padding: 1px 6px; margin-left: 6px; vertical-align: middle; }
.tag-supp { background: rgba(186,117,23,0.13); color: #854F0B; }
.tag-sauna { background: rgba(15,110,86,0.12); color: #0F6E56; }
.tag-mindset { background: rgba(83,74,183,0.12); color: #534AB7; }

/* ── BOOK ── */
.book-card { background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border); padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
.book-name { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.book-meta { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.pages-row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
.pages-row input { width: 150px; font-size: 13px; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text); outline: none; }
.pages-row input:focus { border-color: var(--coral); }
.pages-row button { font-size: 13px; padding: 7px 14px; border: 0.5px solid var(--border2); border-radius: var(--radius-sm); background: var(--bg2); color: var(--text); cursor: pointer; }
.pages-row button:hover { background: var(--bg3); }

/* ── LOADING ── */
.loading { text-align: center; padding: 3rem 1rem; color: var(--text2); font-size: 14px; }

@media (max-width: 700px) {
  .sidebar { width: 52px; }
  .nav-item span:not(.nav-icon) { display: none; }
  .sidebar-panel { display: none !important; }
  .sidebar-top .sidebar-logo, .sidebar-top .sidebar-sub { display: none; }
  .sidebar-top { padding: 0.75rem 0.5rem; justify-content: center; }
  .nav-item { justify-content: center; padding: 10px 0; }
  .main { padding: 1rem 0.75rem 3rem; }
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div>
        <div class="sidebar-logo">Daily</div>
        <div class="sidebar-sub">Your everyday dashboard</div>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <span class="theme-icon theme-icon-sun">☀</span>
        <span class="theme-icon theme-icon-moon">☽</span>
      </button>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="switchPanel('monthly',this)">
        <span class="nav-icon">📅</span><span>Monthly</span>
      </button>
    </nav>
    <div class="sidebar-section">
      <div class="sidebar-panel active" id="panel-monthly">
        <div class="sidebar-panel-title" id="monthPanelTitle">Monthly progress</div>
        <div class="month-header">
          <button class="month-nav" onclick="shiftMonth(-1)">‹</button>
          <span class="month-name" id="calMonthLabel"></span>
          <button class="month-nav" onclick="shiftMonth(1)">›</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="month-stats">
          <div class="mstat"><div class="mstat-label">Days tracked</div><div class="mstat-val" id="mDaysTracked">0</div></div>
          <div class="mstat"><div class="mstat-label">Avg completion</div><div class="mstat-val" id="mAvgPct">—</div></div>
          <div class="mstat"><div class="mstat-label">Perfect days</div><div class="mstat-val" id="mPerfect">0</div></div>
          <div class="mstat"><div class="mstat-label">Best day</div><div class="mstat-val" id="mBest">—</div></div>
        </div>
        <div class="month-prog-label"><span>Month completion</span><span id="mProgPct">0%</span></div>
        <div class="month-prog-track"><div class="month-prog-fill" id="mProgBar" style="width:0%"></div></div>
        <div class="streak-row">
          <span style="font-size:16px">🔥</span>
          <span class="streak-label">Current streak</span>
          <span class="streak-val" id="streakVal">0 days</span>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="main-inner">
      <div class="header">
        <div class="header-left">
          <div class="day-name" id="dayName"></div>
          <div class="date-str" id="dateStr"></div>
        </div>
        <div class="header-right">
          <div class="day-pills" id="dayPills"></div>
          <div style="display:flex;align-items:center;gap:12px">
            <div class="sync-status"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">Loading...</span></div>
            <button class="reset-btn" onclick="resetDay()">Reset today</button>
          </div>
        </div>
      </div>
      <div class="prog-card">
        <div class="prog-header"><span>Today's progress</span><span id="dailyPct">0%</span></div>
        <div class="prog-track"><div class="prog-fill fill-green" id="dailyBar" style="width:0%"></div></div>
        <div class="stat-row">
          <div class="stat"><div class="stat-label">Done today</div><div class="stat-val" id="doneCount">0 / 0</div></div>
          <div class="stat"><div class="stat-label">Week avg</div><div class="stat-val" id="weekAvg">—</div></div>
          <div class="stat"><div class="stat-label">Month avg</div><div class="stat-val" id="monthAvg">—</div></div>
        </div>
      </div>
      <div id="blocks"><div class="loading">Loading your day...</div></div>
      <div class="book-card">
        <div class="book-name" id="bookName">Loading...</div>
        <div class="book-meta" id="bookMeta"></div>
        <div class="prog-header" style="margin-bottom:6px"><span id="bookPct">0%</span><span id="bookPages"></span></div>
        <div class="prog-track"><div class="prog-fill fill-coral" id="bookBar" style="width:0%"></div></div>
        <div class="pages-row">
          <input type="number" id="pagesInput" placeholder="Pages read tonight" min="0">
          <button onclick="logPages()">Log pages</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
// ── CONFIG ──
const SUPABASE_URL = 'https://xclkjrnkpejjgeoktihb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_vG6RJpxrZuHIg6Bh2mxplA_ptMIn3js';
const CONFIG_URL = 'config.json';

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

const realNow = new Date();
const realDayIdx = realNow.getDay();
let viewDayIdx = realDayIdx;
let calYear = realNow.getFullYear();
let calMonth = realNow.getMonth();
let CONFIG = null; // loaded from config.json

// ── SUPABASE HELPERS ──
async function sbGet(key) {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/daily_progress?key=eq.${encodeURIComponent(key)}&select=value`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    return data && data[0] ? JSON.parse(data[0].value) : null;
  } catch(e) { return null; }
}

async function sbSet(key, value) {
  setSyncStatus('syncing');
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/daily_progress`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify({ key, value: JSON.stringify(value), updated_at: new Date().toISOString() })
    });
    setSyncStatus('synced');
  } catch(e) { setSyncStatus('error'); }
}

function setSyncStatus(status) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  dot.className = 'sync-dot ' + status;
  lbl.textContent = status === 'synced' ? 'Synced' : status === 'syncing' ? 'Syncing...' : 'Sync error';
}

// ── KEY HELPERS ──
function dateKey(d) { return d.toISOString().split('T')[0]; }
function viewDate() { const d = new Date(realNow); d.setDate(d.getDate() + (viewDayIdx - realDayIdx)); return d; }
function dayStateKey(idx) { const d = new Date(realNow); d.setDate(d.getDate() + (idx - realDayIdx)); return 'state_' + dateKey(d); }

// ── IN-MEMORY CACHE (reduces Supabase reads) ──
const cache = {};
async function getState(idx) {
  const k = dayStateKey(idx);
  if (cache[k] !== undefined) return cache[k];
  const val = await sbGet(k);
  cache[k] = val || {};
  return cache[k];
}
async function setState(idx, s) {
  const k = dayStateKey(idx);
  cache[k] = s;
  await sbSet(k, s);
  // also save history
  const d = new Date(realNow); d.setDate(d.getDate() + (idx - realDayIdx));
  const dk = dateKey(d);
  const done = Object.values(s).filter(Boolean).length;
  const sched = CONFIG.schedule[DAYS[idx]] || CONFIG.schedule['Sunday'];
  const total = sched.reduce((a, b) => a + b.tasks.length, 0);
  const histKey = 'hist_' + dk;
  cache[histKey] = { done, total };
  await sbSet(histKey, { done, total });
}

async function getBookState() {
  if (cache['books'] !== undefined) return cache['books'];
  const val = await sbGet('books');
  cache['books'] = val || { idx: 0, pagesRead: 0 };
  return cache['books'];
}
async function setBookState(s) {
  cache['books'] = s;
  await sbSet('books', s);
}

async function getHistAll() {
  // fetch all hist_ keys
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/daily_progress?key=like.hist_*&select=key,value`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const data = await res.json();
    const out = {};
    data.forEach(row => {
      const dk = row.key.replace('hist_', '');
      try { out[dk] = JSON.parse(row.value); } catch(e) {}
    });
    return out;
  } catch(e) { return {}; }
}

// ── THEME ──
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
}
(function() {
  const saved = localStorage.getItem('theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  else if (window.matchMedia('(prefers-color-scheme: dark)').matches) document.documentElement.setAttribute('data-theme', 'dark');
})();

// ── SIDEBAR ──
function switchPanel(id, btn) {
  document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');
}

// ── DAY PILLS ──
function buildPills() {
  const el = document.getElementById('dayPills'); el.innerHTML = '';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach((lbl, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-pill' + (i === viewDayIdx ? ' active' : '');
    btn.textContent = i === realDayIdx ? lbl + ' •' : lbl;
    btn.onclick = () => { viewDayIdx = i; render(); };
    el.appendChild(btn);
  });
}

function tagHTML(tag) {
  if (!tag) return '';
  return `<span class="tag tag-${tag}">${tag}</span>`;
}

// ── MAIN RENDER ──
async function render() {
  buildPills();
  const dayName = DAYS[viewDayIdx];
  const d = viewDate();
  const isToday = viewDayIdx === realDayIdx;
  document.getElementById('dayName').textContent = dayName + (isToday ? ' — Today' : '');
  document.getElementById('dateStr').textContent = MONTHS_LONG[d.getMonth()] + ' ' + d.getDate() + ', ' + d.getFullYear();

  const schedule = CONFIG.schedule[dayName] || CONFIG.schedule['Sunday'];
  const state = await getState(viewDayIdx);
  const blocksEl = document.getElementById('blocks'); blocksEl.innerHTML = '';

  let total = 0, done = 0;
  schedule.forEach((blk, bi) => {
    total += blk.tasks.length;
    const blkDone = blk.tasks.filter((_, ti) => !!state[bi + '_' + ti]).length;
    done += blkDone;

    const wrap = document.createElement('div'); wrap.className = 'block';
    const firstOpen = bi === 0;
    const hdr = document.createElement('div');
    hdr.className = 'block-hdr' + (firstOpen ? ' open' : '');
    hdr.innerHTML = `<span class="block-icon">${blk.icon}</span><span class="block-title">${blk.title}</span><span class="block-time">${blk.time}</span><span class="block-badge" id="badge${bi}">${blkDone}/${blk.tasks.length}</span><span class="block-chev${firstOpen ? ' open' : ''}" id="chev${bi}">›</span>`;
    hdr.onclick = () => {
      const body = document.getElementById('body' + bi); const chev = document.getElementById('chev' + bi);
      const open = body.classList.toggle('open'); chev.classList.toggle('open', open); hdr.classList.toggle('open', open);
    };

    const body = document.createElement('div');
    body.className = 'block-body' + (firstOpen ? ' open' : ''); body.id = 'body' + bi;
    const ul = document.createElement('ul'); ul.className = 'task-list';

    blk.tasks.forEach((task, ti) => {
      const key = bi + '_' + ti; const checked = !!state[key];
      const li = document.createElement('li'); li.className = 'task-item';
      const cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'task-cb'; cb.checked = checked; cb.id = 'cb' + bi + '_' + ti;
      const lbl = document.createElement('label'); lbl.htmlFor = cb.id;
      lbl.className = 'task-label' + (checked ? ' done' : '');
      lbl.innerHTML = task.l + tagHTML(task.tag);
      const timeEl = document.createElement('span'); timeEl.className = 'task-time'; timeEl.textContent = task.t || '';
      cb.onchange = async () => {
        const s = await getState(viewDayIdx); s[key] = cb.checked; await setState(viewDayIdx, s);
        lbl.className = 'task-label' + (cb.checked ? ' done' : '');
        recalc(state, schedule);
      };
      li.appendChild(cb); li.appendChild(lbl); li.appendChild(timeEl); ul.appendChild(li);
    });
    body.appendChild(ul); wrap.appendChild(hdr); wrap.appendChild(body); blocksEl.appendChild(wrap);
  });

  recalcWith(total, done);
  await updateWeekMonth();
  await renderBook();
  await renderCalendar();
  setSyncStatus('synced');
}

function recalc(state, schedule) {
  let total = 0, done = 0;
  schedule.forEach((blk, bi) => {
    blk.tasks.forEach((_, ti) => { total++; if (state[bi + '_' + ti]) done++; });
    const bd = blk.tasks.filter((_, ti) => state[bi + '_' + ti]).length;
    const badge = document.getElementById('badge' + bi); if (badge) badge.textContent = bd + '/' + blk.tasks.length;
  });
  recalcWith(total, done);
}

function recalcWith(total, done) {
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById('dailyBar').style.width = pct + '%';
  document.getElementById('dailyPct').textContent = pct + '%';
  document.getElementById('doneCount').textContent = done + ' / ' + total;
}

function getWeekNum(d) { const j = new Date(d.getFullYear(), 0, 1); return Math.ceil(((d - j) / 86400000 + j.getDay() + 1) / 7); }

async function updateWeekMonth() {
  const hist = await getHistAll();
  const d = viewDate();
  const wNum = getWeekNum(d); const yr = d.getFullYear(); const mo = d.getMonth();
  const wdays = Object.entries(hist).filter(([dk]) => { const dd = new Date(dk); return dd.getFullYear() === yr && getWeekNum(dd) === wNum; }).map(([, v]) => v);
  if (wdays.length) { const p = Math.round(wdays.reduce((a, x) => a + x.done, 0) / wdays.reduce((a, x) => a + x.total, 0) * 100); document.getElementById('weekAvg').textContent = p + '%'; }
  const mdays = Object.entries(hist).filter(([dk]) => { const dd = new Date(dk); return dd.getFullYear() === yr && dd.getMonth() === mo; }).map(([, v]) => v);
  if (mdays.length) { const p = Math.round(mdays.reduce((a, x) => a + x.done, 0) / mdays.reduce((a, x) => a + x.total, 0) * 100); document.getElementById('monthAvg').textContent = p + '%'; }
}

function countTotal(dayName) { const s = CONFIG.schedule[dayName] || CONFIG.schedule['Sunday']; return s.reduce((a, b) => a + b.tasks.length, 0); }

function shiftMonth(dir) { calMonth += dir; if (calMonth > 11) { calMonth = 0; calYear++; } if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(); }

async function renderCalendar() {
  const hist = await getHistAll();
  document.getElementById('calMonthLabel').textContent = MONTHS_SHORT[calMonth] + ' ' + calYear;
  document.getElementById('monthPanelTitle').textContent = MONTHS_LONG[calMonth] + ' progress';
  const grid = document.getElementById('calGrid'); grid.innerHTML = '';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => { const el = document.createElement('div'); el.className = 'cal-dow'; el.textContent = d; grid.appendChild(el); });
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const todayStr = dateKey(realNow);
  for (let i = 0; i < firstDay; i++) { const el = document.createElement('div'); el.className = 'cal-day'; grid.appendChild(el); }
  let tracked = 0, totalPct = 0, perfect = 0, bestPct = 0, bestDay = '—';
  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(calYear, calMonth, day); const dk = dateKey(d);
    const el = document.createElement('div'); el.className = 'cal-day'; el.textContent = day;
    if (dk === todayStr) el.classList.add('today');
    const st = hist[dk];
    if (st) {
      const tot = countTotal(DAYS[d.getDay()]);
      const pct = tot ? Math.round(st.done / tot * 100) : 0;
      tracked++; totalPct += pct; if (pct === 100) perfect++; if (pct > bestPct) { bestPct = pct; bestDay = day + ' ' + MONTHS_SHORT[calMonth]; }
      const dot = document.createElement('div'); dot.className = 'dot'; el.appendChild(dot);
      if (pct === 100) el.classList.add('pct-full');
      else if (pct >= 70) el.classList.add('pct-high');
      else if (pct >= 40) el.classList.add('pct-mid');
      else el.classList.add('pct-low');
    }
    grid.appendChild(el);
  }
  const avg = tracked ? Math.round(totalPct / tracked) : 0;
  document.getElementById('mDaysTracked').textContent = tracked;
  document.getElementById('mAvgPct').textContent = tracked ? avg + '%' : '—';
  document.getElementById('mPerfect').textContent = perfect;
  document.getElementById('mBest').textContent = bestDay;
  document.getElementById('mProgPct').textContent = avg + '%';
  document.getElementById('mProgBar').style.width = avg + '%';
  let streak = 0;
  for (let i = 0; i < 365; i++) {
    const d = new Date(realNow); d.setDate(d.getDate() - i); const dk = dateKey(d); const st = hist[dk];
    if (!st) { if (i === 0) continue; break; }
    const tot = countTotal(DAYS[d.getDay()]);
    if (tot && st.done / tot >= 0.8) streak++; else if (i > 0) break;
  }
  document.getElementById('streakVal').textContent = streak + ' day' + (streak === 1 ? '' : 's');
}

async function renderBook() {
  const bs = await getBookState();
  const books = CONFIG.books;
  const book = books[Math.min(bs.idx, books.length - 1)];
  const pct = book.pages ? Math.round(bs.pagesRead / book.pages * 100) : 0;
  document.getElementById('bookName').textContent = book.title;
  document.getElementById('bookMeta').textContent = 'Phase ' + book.phase + ' — Book ' + book.num + ' of ' + book.total;
  document.getElementById('bookPct').textContent = pct + '%';
  document.getElementById('bookPages').textContent = bs.pagesRead + ' / ' + book.pages + ' pages';
  document.getElementById('bookBar').style.width = Math.min(pct, 100) + '%';
}

async function logPages() {
  const inp = document.getElementById('pagesInput'); const n = parseInt(inp.value) || 0; if (n <= 0) return;
  const bs = await getBookState();
  const books = CONFIG.books;
  const book = books[Math.min(bs.idx, books.length - 1)];
  bs.pagesRead += n;
  if (bs.pagesRead >= book.pages) {
    const next = books[bs.idx + 1];
    alert('You finished "' + book.title + '"!\n' + (next ? 'Starting: ' + next.title : 'All books complete!'));
    bs.pagesRead = 0; bs.idx = Math.min(bs.idx + 1, books.length - 1);
  }
  await setBookState(bs); inp.value = ''; renderBook();
}

async function resetDay() {
  if (!confirm('Reset all tasks for ' + DAYS[viewDayIdx] + '?')) return;
  const k = dayStateKey(viewDayIdx); cache[k] = {};
  await sbSet(k, {});
  render();
}

// ── BOOT ──
async function boot() {
  setSyncStatus('syncing');
  try {
    const res = await fetch(CONFIG_URL + '?v=' + Date.now());
    CONFIG = await res.json();
    setSyncStatus('synced');
  } catch(e) {
    setSyncStatus('error');
    document.getElementById('blocks').innerHTML = '<div class="loading">Failed to load config.json. Make sure it is in the same folder as index.html.</div>';
    return;
  }
  render();
}

boot();
</script>
